name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build WebGL demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten 3.1.64
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.64"
          actions-cache-folder: .emsdk-cache

      - name: Create site directory
        run: mkdir -p site

      # Inject -s MIN_WEBGL_VERSION=2 at runtime so the GLSL ES 3.00 shader parser
      # is used, without modifying any source files.
      - name: Build Chapter2/2-OpenGLES3_Primitives-Modern
        continue-on-error: true
        working-directory: Chapter2/2-OpenGLES3_Primitives-Modern
        run: |
          sed 's/-s USE_WEBGL2=1 \\/-s USE_WEBGL2=1 \\\n    -s MIN_WEBGL_VERSION=2 \\/' build_web.sh | bash
          mkdir -p ../../site/Chapter2/2-OpenGLES3_Primitives-Modern
          cp -r web/. ../../site/Chapter2/2-OpenGLES3_Primitives-Modern/

      - name: Generate index.html
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OpenGL ES 3.0 Modern — Interactive Examples</title>
            <style>
              :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --accent:#58a6ff; --text:#c9d1d9; --muted:#8b949e; }
              * { box-sizing:border-box; margin:0; padding:0; }
              body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:2rem 1rem; }
              header { text-align:center; max-width:800px; margin:0 auto 3rem; }
              header h1 { font-size:2rem; color:#fff; margin-bottom:.5rem; }
              header p  { color:var(--muted); font-size:1rem; line-height:1.6; }
              header .badges { margin-top:1rem; display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap; }
              .badge { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:.3rem .8rem; font-size:.8rem; color:var(--muted); }
              .chapter { max-width:1000px; margin:0 auto 2.5rem; }
              .chapter h2 { font-size:1.1rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; border-bottom:1px solid var(--border); padding-bottom:.5rem; margin-bottom:1rem; }
              .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }
              .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:1.2rem; display:flex; flex-direction:column; gap:.8rem; transition:border-color .2s; }
              .card:hover { border-color:var(--accent); }
              .card-title { font-size:.9rem; font-weight:600; color:#fff; line-height:1.3; }
              .card-sub   { font-size:.75rem; color:var(--muted); }
              .btn { display:inline-block; background:var(--accent); color:#0d1117; padding:.45rem 1rem; border-radius:6px; text-decoration:none; font-size:.85rem; font-weight:600; text-align:center; }
              .btn:hover { opacity:.85; }
              footer { text-align:center; color:var(--muted); font-size:.8rem; margin-top:3rem; border-top:1px solid var(--border); padding-top:1.5rem; max-width:1000px; margin-left:auto; margin-right:auto; }
            </style>
          </head>
          <body>
            <header>
              <h1>OpenGL ES 3.0 Modern</h1>
              <p>Interactive WebGL 2.0 examples from the OpenGL ES 3.0 Cookbook.<br>
                 Every demo runs directly in your browser — no install required.</p>
              <div class="badges">
                <span class="badge">WebGL 2.0</span>
                <span class="badge">OpenGL ES 3.0</span>
                <span class="badge">Android</span>
                <span class="badge">Windows Desktop</span>
                <span class="badge">C++17</span>
              </div>
            </header>

            <div class="chapter"><h2>Chapter 2 — Framework &amp; Primitives</h2><div class="grid">
              <div class="card">
                <div class="card-title">2-OpenGLES3 Primitives</div>
                <div class="card-sub">OpenGL primitives - point, line, and triangle with their variations</div>
                <a class="btn" href="Chapter2/2-OpenGLES3_Primitives-Modern/">&#9654; Launch</a>
              </div>
            </div></div>

            <footer>
              OpenGL ES 3.0 Cookbook — modernised open-source edition.<br>
              Built with Emscripten &middot; WebGL 2.0 &middot; C++17
            </footer>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
